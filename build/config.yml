version: '3'

info:
  companyName: "RelayAI"
  productName: "RelayAI"
  productIdentifier: "com.relayai.app"
  description: "AI 模型反代管理工具"
  copyright: "(c) 2025, RelayAI"
  comments: "RelayAI - AI Model Proxy Manager"
  version: "0.0.1"

dev_mode:
  root_path: .
  log_level: warn
  debounce: 1000
  ignore:
    dir:
      - .git
      - node_modules
      - frontend
      - bin
    file:
      - .DS_Store
      - .gitignore
      - "*_test.go"
    watched_extension:
      - "*.go"
      - "*.js"
      - "*.ts"
    git_ignore: true
  executes:
    - cmd: wails3 build DEV=true
      type: blocking
    - cmd: wails3 task common:dev:frontend
      type: background
    - cmd: wails3 task run
      type: primary

fileAssociations: []
other: []
